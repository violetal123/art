<head>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/math/MeshSurfaceSampler.js"></script>

    <style>
        :root { 
            --accent: #c4a173; /* 统一更新为要求的哑光金 */
            --accent-glow: rgba(196, 161, 115, 0.4);
            --bg: #000000; 
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background: radial-gradient(circle at center, #0a0d14 0%, #000000 100%); 
            color: #fff; font-family: 'Noto Serif SC', serif; 
        }
        
        /* 保持深色噪点背景 */
        body::before {
            content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noise"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noise)" opacity="0.08"/%3E%3C/svg%3E');
            mix-blend-mode: overlay;
        }

        canvas#webgl { position: fixed; inset: 0; z-index: 1; outline: none; filter: contrast(1.1) brightness(1.15); }

        /* Main Left UI - 极简排版重塑 */
        #main-left {
            position: fixed; left: 5vw; top: 12vh; bottom: 8vh; z-index: 100;
            display: flex; flex-direction: column; justify-content: space-between; pointer-events: none;
        }
        
        /* 标题与副标题：左上角并排、竖排、底部对齐 */
        .title-group { 
            display: flex; align-items: flex-end; gap: 25px; 
        }
        
        #v-title {
            font-family: '宋体'; font-size: 6rem; color: #c4a173;
            writing-mode: vertical-rl; text-orientation: mixed; margin: 0; line-height: 1; 
            text-shadow: 0 0 40px var(--accent-glow), 0 2px 10px rgba(0,0,0,0.8);
            letter-spacing: 15px; /* 加大字间距 */
            transition: opacity 0.5s ease;
        }
        
        .sub-title {
            writing-mode: vertical-rl; text-orientation: mixed;
            font-size: 0.95rem; letter-spacing: 0.7em; opacity: 0.85;
            color: #ddd; padding-bottom: 8px; /* 微调确保视觉底部完全平齐 */
            text-shadow: 0 2px 6px rgba(0,0,0,0.9);
        }

        /* 底部容器：横向说明文案与操作按钮 */
        .bottom-group {
            display: flex; flex-direction: column; gap: 40px; margin-bottom: 20px;
        }

        #desc-text {
            max-width: 300px; /* 限制最大宽度以保证阅读舒适度 */
            font-size: 0.85rem; line-height: 2.2; opacity: 0.85; 
            letter-spacing: 1.5px; color: #ddd; 
            text-shadow: 0 2px 6px rgba(0,0,0,0.9); /* 确保粒子穿梭时文字清晰 */
            transition: opacity 0.5s ease;
        }
        
        .explore-btn-container {
            pointer-events: auto; cursor: pointer; display: flex; align-items: center; gap: 15px;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .explore-btn-container:hover { transform: translateX(8px); }
        .explore-btn-container:hover .text-ch { text-shadow: 0 0 15px var(--accent-glow); }
        .explore-btn-container .text-ch { font-size: 1rem; color: var(--accent); display: block; letter-spacing: 3px; font-weight: 500;}

        #gesture-guide {

        #category-nav { display: flex; justify-content: center; gap: 50px; margin-bottom: 35px; }

    </style>
</head>

    <script id="vshader" type="x-shader/x-vertex">
        uniform float uTime; uniform float uVolume; uniform float uScatter;
        attribute float aSize;
        varying vec3 vColor; varying float vAlpha;
        void main() {
            vec3 pos = position;
            vec3 dir = normalize(pos);
            pos += dir * uScatter * (50.0 + uVolume * 150.0);
            float h = (pos.y + 250.0) / 500.0;
            float flow = sin(pos.y * 0.05 - uTime * 2.5) * 0.5 + 0.5;
            float timeCycle = mod(uTime * 0.2, 3.0);
            vec3 c1 = vec3(0.63, 0.32, 0.18); vec3 c2 = vec3(0.0, 0.85, 0.9);
            vec3 c3 = vec3(0.1, 0.3, 0.85); vec3 c4 = vec3(0.5, 0.0, 0.6);
            vec3 glaze;
            if(timeCycle < 1.0) glaze = mix(mix(c1, c2, h), mix(c2, c3, h), smoothstep(0.0, 1.0, timeCycle));
            else if(timeCycle < 2.0) glaze = mix(mix(c2, c3, h), mix(c3, c4, h), smoothstep(1.0, 2.0, timeCycle));
            else glaze = mix(mix(c3, c4, h), mix(c1, c2, h), smoothstep(2.0, 3.0, timeCycle));
            vColor = glaze * (1.2 + clamp(uVolume * 4.2, 0.0, 5.0) + flow * 0.3);
            vAlpha = clamp(0.85 + flow * 0.15, 0.0, 1.0);
            vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
            gl_PointSize = aSize * (1100.0 / -mvPos.z) * (1.0 + uVolume * 1.6);
            gl_Position = projectionMatrix * mvPos;
        }
    </script>

            '灯笼瓶': '形似宫灯，腹部宽绰，如月色映照下的点点灯火，温润而安详。',
            '葫芦瓶': '上下相连，形似葫芦，寓意吉祥，在双球体间寻找频率的平衡。',
            '蒜头瓶': '因瓶口形似蒜头而得名，收颈放腹，是极具韵律感的动态造型。',
            '三管瓶': '瓶颈分设三管，器形奇特，代表着多重声部在同一容器内的交织。',
            '贯耳瓶': '颈部饰双贯耳，模仿礼器投壶之形，兼具庄重感与装饰趣味。',
            '花口瓶': '瓶口如繁花绽放，曲线婉转，让硬质的陶瓷拥有了花卉般的柔情。',
            '转心瓶': '内外双层，机关巧妙，转动间是时间与声画同步的视觉奇迹。',
            '执壶': '长流弯柄，原本用于倾倒佳酿，如今在手势中倾泻流动的频率。',
            '棒槌瓶': '瓶身挺直如棒槌，刚健有力，是康熙朝瓷器雄浑风格的象征。',
            '纸槌瓶': '仿自造纸所用的槌具，造型古朴，颈部长而有力，比例严谨。',
            '长颈瓶': '颈部比例极大延展，拉长了空间的视觉感，宛如声音频率的悠长余韵。',
            '弦纹瓶': '瓶身布满凸起的弦线，如古琴琴弦，赋予静态器型以节奏律动感。',
            '柳叶瓶': '瓶身修长如柳叶，灵动秀气，是陶瓷中最为纤细飘逸的精品。',
            '鹿耳尊': '双侧饰以灵动鹿耳，形态生动，代表着山林自然的生命气息。'
        };

        // 核心逻辑高度保留
        const MODELS_CONFIG = {
            '圆器': ['赏瓶', '橄榄瓶', '天球瓶', '梅瓶', '玉壶春瓶', '观音瓶', '胆式瓶', '净瓶'],
            '方异': ['琮式瓶', '四方瓶', '八角瓶', '直筒瓶', '灯笼瓶'],
            '巧饰': ['葫芦瓶', '蒜头瓶', '三管瓶', '贯耳瓶', '花口瓶', '转心瓶', '执壶'],
            '长挺': ['棒槌瓶', '纸槌瓶', '长颈瓶', '弦纹瓶', '柳叶瓶', '鹿耳尊']
        };
        const modelData = new Map();
        let scene, camera, renderer, points, blackHull, uniforms, hullUniforms, controls;
        let audioCtx, analyser, dataArray, micStream, fileSource, smoothVol = 0;
        let lastHandXLocal = 0, isPinchingNow = false, lastPinchTime = 0;
        let isSensorInited = false;
        let currentModelName = "天球瓶"; // 持久化当前器型，防止动画过渡期间出现抓取错位

        async function loadAssets() {
            const loader = new THREE.OBJLoader();
            const all = Object.values(MODELS_CONFIG).flat();
            let count = 0;
            for(const name of all) {
                try {
                    const obj = await loader.loadAsync(`obj/${encodeURIComponent(name)}.obj`);
                    modelData.set(name, processModel(obj));
                    count++;
                    document.getElementById('load-text').innerText = `SYNCHRONIZING: ${Math.floor(count/all.length*100)}%`;
                } catch(e) { console.warn("Skip:", name); }
            }
            document.querySelector('.loader-line').style.display = 'none';
            document.getElementById('load-text').style.display = 'none';
            document.getElementById('start-btn').style.display = 'block';
            initGalleryUI();
        }

        function processModel(obj) {
            let mesh; obj.traverse(c => { if(c.isMesh) mesh = c; });
            mesh.geometry.center();
            const box = new THREE.Box3().setFromObject(mesh);
            const size = box.getSize(new THREE.Vector3());
            const sc = 550 / Math.max(size.x, size.y, size.z);
            mesh.geometry.scale(sc, sc, sc);
            const sampler = new THREE.MeshSurfaceSampler(mesh).build();
            const count = 500000; 
            const pos = new Float32Array(count * 3), siz = new Float32Array(count);
            const _v = new THREE.Vector3();
            for(let i=0; i<count; i++) {
                sampler.sample(_v);
                pos[i*3]=_v.x; pos[i*3+1]=_v.y; pos[i*3+2]=_v.z;
                siz[i] = Math.random() * 1.6 + 1.2;
            }
            return { pos, siz, geo: mesh.geometry.clone() };
        }

        function initScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 1, 10000);
            camera.position.set(0, 100, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl'), antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true; 
            controls.autoRotateSpeed = 1.6;

            hullUniforms = { uOpacity: { value: 0.95 } };
            blackHull = new THREE.Mesh(new THREE.BufferGeometry(), new THREE.ShaderMaterial({
                uniforms: hullUniforms,
                vertexShader: `void main(){ gl_Position=projectionMatrix*modelViewMatrix*vec4(position-normal*1.5,1.0); }`,
                fragmentShader: `uniform float uOpacity; void main(){ gl_FragColor=vec4(0.04,0.05,0.06,uOpacity); }`,
                transparent: true, side: THREE.DoubleSide
            }));
            blackHull.renderOrder = 1; scene.add(blackHull);

            uniforms = { uTime: {value:0}, uVolume: {value:0}, uScatter: {value:0} };
            points = new THREE.Points(new THREE.BufferGeometry(), new THREE.ShaderMaterial({
                uniforms, vertexShader: document.getElementById('vshader').textContent,
                fragmentShader: `varying vec3 vColor; varying float vAlpha; void main(){ 
                    float d = distance(gl_PointCoord, vec2(0.5));
                    if(d > 0.5) discard;
                    gl_FragColor = vec4(vColor * pow(1.0-d*2.0, 1.6), vAlpha);
                }`,
                transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
            }));
            points.renderOrder = 2; scene.add(points);
            
            selectModel("天球瓶");
            animate();
        }

        function selectModel(name) {
            const data = modelData.get(name);
            if(!data) return;
            
            // 实时更新状态，解决手势极速触发带来的文字不同步问题
            currentModelName = name;
            
            const titleEl = document.getElementById('v-title');
            const descEl = document.getElementById('desc-text');
            
            if (titleEl && descEl) {
                // 文字 0.5s 淡出过渡
                titleEl.style.opacity = 0;
                descEl.style.opacity = 0;
                
                setTimeout(() => {
                    titleEl.innerText = name;
                    descEl.innerText = MODEL_DESCRIPTIONS[name] || '';
                    titleEl.style.opacity = 1;
                    descEl.style.opacity = 1;
                }, 500); // 对应 CSS 中设置的 0.5s transition
            }

            // 3D 渲染核心层立即响应更新
            points.geometry.setAttribute('position', new THREE.BufferAttribute(data.pos, 3));
            points.geometry.setAttribute('aSize', new THREE.BufferAttribute(data.siz, 1));
            points.geometry.attributes.position.needsUpdate = true;
            blackHull.geometry.dispose();
            blackHull.geometry = data.geo;
            uniforms.uScatter.value = 0;
        }

        function setupAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 128;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            document.getElementById('audio-input').onchange = (e) => {
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const buf = await audioCtx.decodeAudioData(ev.target.result);
                    if(fileSource) fileSource.stop();
                    fileSource = audioCtx.createBufferSource();
                    fileSource.buffer = buf;
                    fileSource.connect(analyser);
                    analyser.connect(audioCtx.destination);
                    fileSource.start();
                };
                reader.readAsArrayBuffer(e.target.files[0]);
            };

            document.getElementById('mic-btn').onclick = async function() {
                const zh = this.querySelector('.btn-zh');
                const en = this.querySelector('.btn-en');
                const icon = this.querySelector('.btn-icon');
                if(micStream) {
                    micStream.getTracks().forEach(t => t.stop()); micStream = null;
                    zh.innerText = "麦克风: 关"; en.innerText = "MIC OFF";
                    icon.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12H3a9 9 0 0 0 8 8.94V23h2v-2.06a8.98 8.98 0 0 0 5.39-2"/></svg>`;
                } else {
                    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioCtx.createMediaStreamSource(micStream).connect(analyser);
                    zh.innerText = "麦克风: 开"; en.innerText = "MIC ON";
                    icon.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/></svg>`;
                }
            };
        }

        function handleCamClick(el) {
            if(!isSensorInited) {
                el.classList.add('active');
                initSensors();
                isSensorInited = true;
            }
        }

        function initSensors() {
            const video = document.getElementById('input_video');
            const canvas = document.getElementById('hand-canvas');
            const ctx = canvas.getContext('2d');
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
            hands.onResults(res => {
                if (!res || !res.multiHandLandmarks) return;
                ctx.save(); ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (res.multiHandLandmarks.length > 0) {
                    const lms = res.multiHandLandmarks[0];
                    drawConnectors(ctx, lms, HAND_CONNECTIONS, {color: '#c4a173', lineWidth: 3});
                    drawLandmarks(ctx, lms, {color: '#fff', radius: 1.5});
                    const d = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y);
                    const pinchDist = d(lms[4], lms[8]);
                    const targetScale = THREE.MathUtils.mapLinear(pinchDist, 0.05, 0.4, 1.0, 3.2);
                    points.scale.setScalar(THREE.MathUtils.lerp(points.scale.x, Math.max(1.0, targetScale), 0.15));
                    blackHull.scale.copy(points.scale);
                    
                    const targetRotY = -(lms[9].x - 0.5) * Math.PI * 2.8;
                    const targetRotX = (lms[9].y - 0.5) * Math.PI * 1.5;
                    points.rotation.y = THREE.MathUtils.lerp(points.rotation.y, targetRotY, 0.1);
                    points.rotation.x = THREE.MathUtils.lerp(points.rotation.x, targetRotX, 0.1);
                    blackHull.rotation.copy(points.rotation);

                    const now = Date.now();
                    if (pinchDist < 0.04 && !isPinchingNow && (now - lastPinchTime > 1500)) {
                        const keys = Array.from(modelData.keys());
                        let idx = keys.indexOf(currentModelName); // 采用状态索引
                        selectModel(keys[(idx + 1) % keys.length]);
                        lastPinchTime = now;
                    }
                    isPinchingNow = pinchDist < 0.04;
                    lastHandXLocal = lms[0].x;
                } else {
                    if (lastHandXLocal !== 0) {
                        new TWEEN.Tween(points.rotation).to({x:0, y:0}, 1000).easing(TWEEN.Easing.Quadratic.Out).start();
                        new TWEEN.Tween(points.scale).to({x:1, y:1, z:1}, 1000).easing(TWEEN.Easing.Quadratic.Out).start();
                        new TWEEN.Tween(blackHull.rotation).to({x:0, y:0}, 1000).easing(TWEEN.Easing.Quadratic.Out).start();
                        new TWEEN.Tween(blackHull.scale).to({x:1, y:1, z:1}, 1000).easing(TWEEN.Easing.Quadratic.Out).start();
                        lastHandXLocal = 0; isPinchingNow = false;
                    }
                }
                ctx.restore();
            });
            new Camera(video, { onFrame: async () => { canvas.width = video.videoWidth; canvas.height = video.videoHeight; await hands.send({image: video}); }}).start();
        }

        window.onresize = () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight; 
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        };

        function animate() {
            requestAnimationFrame(animate);
            TWEEN.update();
            uniforms.uTime.value += 0.015;
            
            if(analyser) {
                analyser.getByteFrequencyData(dataArray);
                let l = 0; for(let i = 0; i < 10; i++) l += dataArray[i]; 
                smoothVol += (l / 15000 - smoothVol) * 0.1; /* 严格保留阈值逻辑 */
                uniforms.uVolume.value = smoothVol;
                
                // 将音频数据映射到右上角波纹动态 Icon
                const bars = document.querySelectorAll('.w-bar');
                if(bars.length === 5) {
                    bars[0].style.height = `${2 + (dataArray[2] || 0)/255 * 10}px`;
                    bars[1].style.height = `${2 + (dataArray[5] || 0)/255 * 14}px`;
                    bars[2].style.height = `${2 + (dataArray[8] || 0)/255 * 18}px`;
                    bars[3].style.height = `${2 + (dataArray[11] || 0)/255 * 14}px`;
                    bars[4].style.height = `${2 + (dataArray[14] || 0)/255 * 10}px`;
                }
            }
            
            controls.update();
            renderer.render(scene, camera);
        }

        function initGalleryUI() {
            const nav = document.getElementById('category-nav');
            Object.keys(MODELS_CONFIG).forEach((cat, i) => {
                const el = document.createElement('div');
                el.className = `cat-item ${i===0?'active':''}`;
                el.innerText = cat;
                el.onclick = () => {
                    document.querySelectorAll('.cat-item').forEach(x => x.classList.remove('active'));
                    el.classList.add('active');
                    renderVessels(cat);
                };
                nav.appendChild(el);
            });
            renderVessels(Object.keys(MODELS_CONFIG)[0]);
        }

        function renderVessels(cat) {
            const scroll = document.getElementById('gallery-scroll'); scroll.innerHTML = '';
            MODELS_CONFIG[cat].forEach(name => {
                const card = document.createElement('div');
                card.className = 'vessel-card';
                card.innerHTML = `<div style="width:40px;height:80px;background:var(--accent);opacity:0.3;clip-path:polygon(20% 0, 80% 0, 100% 100%, 0 100%);"></div><span style="margin-top:25px;font-size:0.75rem;letter-spacing:4px;color:var(--accent);">${name}</span>`;
                card.onclick = () => { selectModel(name); document.getElementById('gallery-wrapper').classList.remove('active'); };
                scroll.appendChild(card);
            });
        }

        window.onload = loadAssets;
        document.getElementById('start-btn').onclick = () => {
            initScene(); setupAudio();
            document.getElementById('entry-mask').style.opacity = 0;
            setTimeout(() => document.getElementById('entry-mask').remove(), 1000);
        };
    </script>
</body>
